<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light p-4">
  <div class="card shadow-sm border-0" style="max-width: 420px; width: 100%;">
    <div class="card-body p-4 text-center">
      <div *ngIf="status === 'loading'" class="py-4">
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <p class="mb-0 text-muted">{{ 'AUTH.VERIFY_EMAIL_LOADING' | translate }}</p>
      </div>

      <div *ngIf="status === 'success'">
        <div class="mb-3 text-success" style="font-size: 2.5rem;">✓</div>
        <h1 class="h5 mb-2">{{ 'AUTH.VERIFY_EMAIL_SUCCESS_TITLE' | translate }}</h1>
        <p class="text-muted small mb-4">{{ message }}</p>
        <button type="button" class="btn btn-primary w-100" (click)="goToLogin()">{{ 'AUTH.SIGN_IN' | translate }}</button>
      </div>

      <div *ngIf="status === 'error'">
        <div class="mb-3 text-danger" style="font-size: 2.5rem;">!</div>
        <h1 class="h5 mb-2">{{ 'AUTH.VERIFY_EMAIL_ERROR_TITLE' | translate }}</h1>
        <p class="text-muted small mb-4">{{ message }}</p>
        <button type="button" class="btn btn-outline-primary w-100" (click)="goToLogin()">{{ 'AUTH.SIGN_IN' | translate }}</button>
      </div>
    </div>
  </div>
</div>
