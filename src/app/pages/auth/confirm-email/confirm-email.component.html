<div class="row min-vh-100 align-items-center justify-content-center bg-light">
  <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-md-5 text-center">
        <div class="mb-3" style="font-size: 2.5rem;">📧</div>
        <h1 class="h4 mb-3">{{ 'AUTH.CONFIRM_EMAIL_TITLE' | translate }}</h1>
        <p class="text-muted mb-4">{{ 'AUTH.CONFIRM_EMAIL_BODY' | translate }}</p>
        <p class="small text-break mb-4" *ngIf="email"><strong>{{ email }}</strong></p>
        <p class="small text-muted mb-4">{{ 'AUTH.CONFIRM_EMAIL_SPAM_HINT' | translate }}</p>

        <div class="d-grid gap-2">
          <button type="button" class="btn btn-primary" [disabled]="resendLoading" (click)="resend()">
            <span *ngIf="resendLoading" class="spinner-border spinner-border-sm me-2"></span>
            {{ 'AUTH.RESEND_VERIFICATION' | translate }}
          </button>
          <a routerLink="/auth/login" class="btn btn-outline-secondary">{{ 'AUTH.BACK_TO_SIGN_IN' | translate }}</a>
        </div>
      </div>
    </div>
  </div>
</div>
