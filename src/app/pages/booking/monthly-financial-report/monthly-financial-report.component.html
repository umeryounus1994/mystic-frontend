<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple" [fullScreen]="true">
  <p style="font-size: 30px; color: white">{{ 'COMMON.FETCHING_DATA' | translate }}</p>
</ngx-spinner>

<div class="row mb-3">
  <div class="col-12">
    <h1 class="h3 mb-2">{{ 'BOOKING_REPORT.TITLE' | translate }}</h1>
    <p class="text-muted mb-0">{{ 'BOOKING_REPORT.DESCRIPTION' | translate }}</p>
  </div>
</div>

<div class="card bg-transparent border">
  <div class="card-body p-4">
    <div class="row g-4 align-items-end">
      <div class="col-md-6 col-lg-4">
        <label class="form-label">{{ 'BOOKING_REPORT.PARTNER' | translate }}</label>
        <select class="form-select" [(ngModel)]="selectedPartnerId" name="partner">
          <option value="">{{ 'BOOKING_REPORT.SELECT_PARTNER_PLACEHOLDER' | translate }}</option>
          <option *ngFor="let p of partners" [value]="p.id">{{ p.label }}</option>
        </select>
      </div>
      <div class="col-6 col-md-3 col-lg-2">
        <label class="form-label">{{ 'COMMON.DATE' | translate }} — {{ 'BOOKING_REPORT.YEAR' | translate }}</label>
        <select class="form-select" [(ngModel)]="year" name="year">
          <option *ngFor="let y of yearOptions()" [ngValue]="y">{{ y }}</option>
        </select>
      </div>
      <div class="col-6 col-md-3 col-lg-2">
        <label class="form-label">{{ 'BOOKING_REPORT.MONTH' | translate }}</label>
        <select class="form-select" [(ngModel)]="month" name="month">
          <option *ngFor="let mo of monthOptions" [ngValue]="mo.value">{{ mo.labelKey | translate }}</option>
        </select>
      </div>
      <div class="col-12 col-lg-4">
        <button
          type="button"
          class="btn btn-primary"
          [disabled]="generating || !selectedPartnerId"
          (click)="generatePdf()">
          <span *ngIf="generating" class="spinner-border spinner-border-sm me-2" role="status"></span>
          <i *ngIf="!generating" class="bi bi-file-earmark-pdf me-2"></i>
          {{ 'BOOKING_REPORT.GENERATE_PDF' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>
